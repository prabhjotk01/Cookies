<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="prabhjot">
        <meta name="description" content="My first web page">
        <meta name="keywords" content="cookies">
        <link rel="icon" href="./assets/media/download.png" type="image/x-icon">
        <script src="./assets/script/app.js" defer></script>
        <link rel="stylesheet" href="assets/style/index.css">
    </head>
    <body>
        <main>
            <div class="container">
                <div class="hero">
                    <h1>welcome</h1>
                    <p>We use cookies to improve your browsing experience.</p>
                    <p>These cookies help us understand your device and preferences.</p>  
                    <p>you can manage your settings anytime.</p>  
                            
                    
                </div>
                
            </div>
        </main>
        <div class="overlay" id="overlay"></div>

        <div class="box" id="box1">
        <h2>We Use Cookies</h2>
        <p>We store your browser, OS, and screen info.</p>
        <button id="acceptBtn">Accept All</button>
        <button id="settingsBtn">Settings</button>
        </div>
        <div class="box" id="box2">
        <h2>Cookie Settings</h2>

        <div class="item">
            <label>Browser Name</label>
            <input type="checkbox" id="chkBrowser" checked>
        </div>

        <div class="item">
            <label>Operating System</label>
            <input type="checkbox" id="chkOS" checked>
        </div>

        <div class="item">
            <label>Screen Size</label>
            <input type="checkbox" id="chkScreen" checked>
        </div>  
        <button id="saveBtn">Save</button>
        <button id="rejectBtn">Reject All</button>
        </div> 
    </body>
</html>
